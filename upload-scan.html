<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Scan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body class="simulator-body">

<header class="top-header">
<div class="header-left">
<img src="Images/logo.png">
<h1>Advancing Medicine with Technology & AI</h1>
</div>
</header>

<div class="simulator-wrapper">
<div class="simulator-container">

<div class="menu-panel">

<a href="upload-scan.html" class="menu-btn active">Upload Scan</a>
<a href="segment.html" class="menu-btn">Segment</a>
<a href="edit-profile.html" class="menu-btn">Edit Profile</a>
<a href="view.html" class="menu-btn">View</a>
<a href="assess-wound.html" class="menu-btn">Assess Wound</a>
<a href="print.html" class="menu-btn">Print</a>

<a href="#" id="saveBtn" class="menu-btn">Save</a>
<a href="#" id="logoutBtn" class="menu-btn logout">Log Out</a>

</div>

<div class="display-panel">

<h2 class="page-title">Upload Scan</h2>

<button id="uploadBtn" class="action-btn">Choose Image</button>
<input type="file" id="fileInput" accept="image/*" hidden>

<button id="removeBtn" class="action-btn">Remove Scan</button>

<p id="fileName">No file selected</p>

<div class="preview-container">
<img id="previewImage" style="display:none; max-width:100%; max-height:260px; border-radius:8px;">
<p id="placeholder">Uploaded scan will appear here</p>
</div>

</div>
</div>
</div>

<script>

const uploadBtn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const previewImage = document.getElementById("previewImage");
const placeholder = document.getElementById("placeholder");
const fileName = document.getElementById("fileName");
const removeBtn = document.getElementById("removeBtn");

uploadBtn.onclick = () => fileInput.click();

fileInput.addEventListener("change", function(){

const file = fileInput.files[0];

if(!file || !file.type.startsWith("image/")){
alert("Upload a valid image");
return;
}

const reader = new FileReader();

reader.onload = function(e){

const imageData = e.target.result;

previewImage.src = imageData;
previewImage.style.display = "block";
placeholder.style.display = "none";
fileName.textContent = file.name;

/* SKAPA CASE */
const caseData = {
scanImage: imageData,
segmentedImage: null,
assessment: null
};

localStorage.setItem("currentCase", JSON.stringify(caseData));

};

reader.readAsDataURL(file);

});

removeBtn.onclick = function(){

localStorage.removeItem("currentCase");

previewImage.style.display = "none";
placeholder.style.display = "block";
fileName.textContent = "No file selected";

};

document.getElementById("saveBtn").onclick = e => {
e.preventDefault();
alert("Saved");
};

document.getElementById("logoutBtn").onclick = e => {
e.preventDefault();
window.location.href = "index.html";
};

</script>

</body>
</html>
