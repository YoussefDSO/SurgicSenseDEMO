<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Upload Scan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="segment.css" />
  </head>

  <body class="simulator-body">
    <header class="top-header">
      <div class="header-left">
        <img src="Images/logo.png" alt="Logo" />
        <h1>Advancing Medicine with Technology & AI</h1>
      </div>
    </header>

    <div class="simulator-wrapper">
      <div class="simulator-container">
        <!-- LEFT MENU -->

        <div class="menu-panel">
          <a href="upload-scan.html" class="menu-btn active">Upload Scan</a>
          <a href="segment.html" class="menu-btn">Segment</a>
          <a href="edit-profile.html" class="menu-btn">Edit Profile</a>
          <a href="view.html" class="menu-btn">View</a>
          <a href="print.html" class="menu-btn">Print</a>
          <a href="assess-wound.html" class="menu-btn">Assess Wound</a>
          <a href="#" id="saveBtn" class="menu-btn">Save</a>
          <a href="index.html" id="logoutBtn" class="menu-btn logout"
            >Log Out</a
          >
        </div>

        <!-- RIGHT PANEL -->
        <div class="display-panel">
          <h2 class="page-title">Upload Scan</h2>

          <div class="upload-layout">
            <!-- LEFT SIDE (controls) -->
            <div class="upload-controls">
              <!-- SELECT DEMO -->
              <select id="modelSelect" class="select-input">
                <option value="">Select a scan</option>
              </select>

              <!-- FILE INPUTS -->
              <label class="upload-btn">
                <span id="objLabel">Upload OBJ file</span>
                <input type="file" id="objInput" accept=".obj" />
              </label>

              <label class="upload-btn">
                <span id="textureLabel">Upload texture</span>
                <input type="file" id="textureInput" accept=".jpg,.png" />
              </label>

              <label class="upload-btn">
                <span id="mtlLabel">Upload MTL file</span>
                <input type="file" id="mtlInput" accept=".mtl" />
              </label>

              <!-- ZIP -->
              <label class="upload-btn">
                <span id="zipLabel">Upload ZIP folder</span>
                <input type="file" id="zipInput" accept=".zip" />
              </label>

              <!-- BUTTON -->
              <button id="uploadModelBtn" class="action-btn">
                Upload Scan
              </button>

              <!-- STATUS -->
              <p id="uploadStatus" class="status-text"></p>
            </div>

            <!-- RIGHT SIDE (preview) -->
            <div class="preview-section">
              <h3>Preview</h3>

              <div class="preview-box">
                <img id="preview" />
                <p id="placeholder">No preview yet</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="upload-scan.js"></script>
  </body>
</html>
