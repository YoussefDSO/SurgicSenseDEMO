<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Segmentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body class="simulator-body">

<header class="top-header">
<div class="header-left">
<img src="Images/logo.png" alt="Logo">
<h1>Advancing Medicine with Technology & AI</h1>
</div>
</header>

<div class="simulator-wrapper">
<div class="simulator-container">

<div class="menu-panel">

<a href="upload-scan.html" class="menu-btn">Upload Scan</a>
<a href="segment.html" class="menu-btn active">Segment</a>
<a href="edit-profile.html" class="menu-btn">Edit Profile</a>
<a href="view.html" class="menu-btn">View</a>
<a href="print.html" class="menu-btn">Print</a>
<a href="assess-wound.html" class="menu-btn">Assess Wound</a>
<a href="#" class="menu-btn">Save</a>

<a href="index.html" class="menu-btn logout">Log Out</a>

</div>

<div class="display-panel">

<h2 class="page-title">Segmentation</h2>

<button id="segmentBtn" class="action-btn">Run Segmentation</button>

<div style="margin-top:20px">

<h3>Uploaded Scan</h3>
<div id="preview"></div>

<h3 style="margin-top:20px">Segmentation Result</h3>
<div id="result">No segmentation yet</div>

</div>

</div>
</div>
</div>

<script>

const preview = document.getElementById("preview");
const result = document.getElementById("result");

const image = localStorage.getItem("originalScan");

if(image){

preview.innerHTML =
'<img src="'+image+'" style="max-width:100%;max-height:240px;border-radius:8px;">';

}else{

preview.innerHTML = "No uploaded scan found.";

}

document.getElementById("segmentBtn").onclick = function(){

if(!image){
alert("Upload a scan first.");
return;
}

result.innerHTML =
'<div style="position:relative;display:inline-block;">'+
'<img src="'+image+'" style="max-width:100%;max-height:240px;border-radius:8px;">'+
'<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.3);border-radius:8px;"></div>'+
'</div>';

localStorage.setItem("segmentedScan", image);

};

</script>

</body>
</html>
