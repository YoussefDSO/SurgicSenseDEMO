<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Segmentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="segment.css" />
  </head>

  <body class="simulator-body">
    <!-- HEADER -->
    <header class="top-header">
      <div class="header-left">
        <img src="Images/logo.png" alt="Logo" />
        <h1>Advancing Medicine with Technology & AI</h1>
      </div>
    </header>

    <div class="simulator-wrapper">
      <div class="simulator-container">
        <!-- LEFT MENU -->
        <div class="menu-panel">
          <a href="upload-scan.html" class="menu-btn">Upload Scan</a>
          <a href="segment.html" class="menu-btn active">Segment</a>
          <a href="edit-profile.html" class="menu-btn">Edit Profile</a>
          <a href="view.html" class="menu-btn">View</a>
          <a href="print.html" class="menu-btn">Print</a>
          <a href="assess-wound.html" class="menu-btn">Assess Wound</a>
          <a href="#" class="menu-btn">Save</a>
          <a href="index.html" class="menu-btn logout">Log Out</a>
        </div>

        <!-- RIGHT PANEL -->
        <div class="display-panel">
          <h2 class="page-title">Segmentation</h2>

          <!-- TOP CONTROLS -->
          <div class="segment-controls">
            <div class="model-row">
              <label>Scan:</label>
              <span id="currentModelText">—</span>
              <button id="changeBtn" class="small-btn">Change</button>
            </div>
            <button id="segmentBtn" class="action-btn">
              <span id="btnText">Run Segmentation</span>
              <span id="btnLoader" class="btn-loader hidden"></span>
            </button>
          </div>

          <!-- RESULTS -->
          <div class="results-wrapper">
            <div class="results-row">
              <!-- PREVIEW -->
              <div class="result-block">
                <h3>Preview</h3>
                <div id="preview"></div>
              </div>

              <!-- RESULT -->
              <div class="result-block">
                <h3>Segmentation Result</h3>
                <div class="result-inner">
                  <div id="result"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="segment.js"></script>
  </body>
</html>
