<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Segmentation</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="segment.css" />
  </head>

  <body class="segment-page">
    <header class="top-header">
      <div class="header-left">
        <img src="Images/download.png" alt="Logo" />
        <h1>Advancing Medicine with Technology & AI</h1>
      </div>
    </header>

    <main class="segment-container">
      <h2 class="dashboard-title">3D Model Viewer with Segmentation</h2>

      <div class="segment-form">
        <!-- MODE SWITCH -->
        <div class="mode-select">
          <label>
            <input type="radio" name="mode" value="upload" checked />
            Upload your own scan
          </label>

          <label>
            <input type="radio" name="mode" value="demo" />
            Use demo model
          </label>
        </div>

        <!-- DEMO DROPDOWN -->
        <div id="demoSelectContainer" style="display: none">
          <select id="modelSelect">
            <option value="">Select a model</option>
          </select>
        </div>

        <!-- UPLOAD FILES -->
        <div id="uploadSection">
          <div class="file-group">
            <label class="upload-btn">
              <span>Select OBJ file</span>
              <input type="file" id="objInput" accept=".obj" />
            </label>
          </div>

          <div class="file-group">
            <label class="upload-btn">
              <span>Select Texture</span>
              <input type="file" id="textureInput" accept=".jpg,.png" />
            </label>
          </div>

          <div class="file-group">
            <label class="upload-btn">
              <span>Select MTL file</span>
              <input type="file" id="mtlInput" accept=".mtl" />
            </label>
          </div>
        </div>

        <button id="previewBtn" class="menu-btn">Preview</button>
        <button id="segmentBtn" class="menu-btn">Segment</button>
      </div>

      <div class="segment-results">
        <div class="segment-box">
          <h3>Preview before segmentation</h3>
          <div class="placeholder" id="previewBox">Image preview</div>
        </div>

        <div class="segment-box">
          <h3>Segmentation Result</h3>
          <div class="placeholder" id="resultBox">Result preview</div>
        </div>
      </div>
    </main>

    <script src="segment.js"></script>
  </body>
</html>
