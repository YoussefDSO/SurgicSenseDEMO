<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Segmentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="segment.css" />
  </head>

  <body class="simulator-body">
    <header class="top-header">
      <div class="header-left">
        <img src="Images/logo.png" alt="Logo" />
        <h1>Advancing Medicine with Technology & AI</h1>
      </div>
    </header>

    <div class="simulator-wrapper">
      <div class="simulator-container">
        <div class="menu-panel">
          <a href="upload-scan.html" class="menu-btn">Upload Scan</a>
          <a href="segment.html" class="menu-btn active">Segment</a>
          <a href="edit-profile.html" class="menu-btn">Edit Profile</a>
          <a href="view.html" class="menu-btn">View</a>
          <a href="print.html" class="menu-btn">Print</a>
          <a href="assess-wound.html" class="menu-btn">Assess Wound</a>
          <a href="#" class="menu-btn">Save</a>

          <a href="index.html" class="menu-btn logout">Log Out</a>
        </div>

        <div class="display-panel">
          <h2 class="page-title">Segmentation</h2>

          <div class="mode-switch">
            <label class="mode-option">
              <input type="radio" name="mode" value="demo" checked />
              <span>Demo model</span>
            </label>

            <label class="mode-option">
              <input type="radio" name="mode" value="upload" />
              <span>Upload files</span>
            </label>
          </div>

          <div class="segment-controls">
            <div id="demoSection">
              <select id="modelSelect" class="menu-btn">
                <option value="">Select a scan</option>
              </select>
            </div>

            <div id="uploadSection" class="hidden">
              <div class="file-group">
                <label class="upload-btn">
                  <span id="objLabel">Upload OBJ file</span>
                  <input type="file" id="objInput" accept=".obj" />
                </label>
              </div>

              <div class="file-group">
                <label class="upload-btn">
                  <span id="textureLabel">Upload texture</span>
                  <input type="file" id="textureInput" accept=".jpg,.png" />
                </label>
              </div>

              <div class="file-group">
                <label class="upload-btn">
                  <span id="mtlLabel">Upload MTL file</span>
                  <input type="file" id="mtlInput" accept=".mtl" />
                </label>
              </div>

              <button id="previewBtn" class="action-btn">Preview</button>
            </div>

            <button id="segmentBtn" class="action-btn">Run Segmentation</button>
          </div>

          <div class="results">
            <h3>Uploaded Scan</h3>
            <div id="preview"></div>

            <h3>Segmentation Result</h3>
            <div id="result">No segmentation yet</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const preview = document.getElementById("preview");

      const image = localStorage.getItem("originalScan");

      if (image) {
        preview.innerHTML =
          '<img src="' +
          image +
          '" style="max-width:100%;max-height:240px;border-radius:8px;">';
      } else {
        preview.innerHTML = "No uploaded scan found.";
      }
    </script>

    <script src="segment.js"></script>
  </body>
</html>
