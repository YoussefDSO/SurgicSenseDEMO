<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Segmentation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body class="simulator-body">

<header class="top-header">
<div class="header-left">
<img src="Images/logo.png">
<h1>Advancing Medicine with Technology & AI</h1>
</div>
</header>

<div class="simulator-wrapper">
<div class="simulator-container">

<div class="menu-panel">

<a href="upload-scan.html" class="menu-btn">Upload Scan</a>
<a href="segment.html" class="menu-btn active">Segment</a>
<a href="edit-profile.html" class="menu-btn">Edit Profile</a>
<a href="view.html" class="menu-btn">View</a>
<a href="assess-wound.html" class="menu-btn">Assess Wound</a>
<a href="print.html" class="menu-btn">Print</a>

<a href="#" id="saveBtn" class="menu-btn">Save</a>
<a href="#" id="logoutBtn" class="menu-btn logout">Log Out</a>

</div>

<div class="display-panel">

<h2 class="page-title">Segmentation</h2>

<button id="segmentBtn" class="action-btn">Run Segmentation</button>

<h3>Uploaded Scan</h3>
<div id="preview"></div>

<h3>Segmentation Result</h3>
<div id="result">No segmentation yet</div>

</div>
</div>
</div>

<script>

const preview = document.getElementById("preview");
const result = document.getElementById("result");

let caseData = JSON.parse(localStorage.getItem("currentCase"));

if(caseData && caseData.scanImage){

preview.innerHTML =
`<img src="${caseData.scanImage}" style="max-width:100%;max-height:240px;border-radius:8px;">`;

}else{
preview.innerHTML = "No scan found.";
}

document.getElementById("segmentBtn").onclick = function(){

if(!caseData || !caseData.scanImage){
alert("Upload first");
return;
}

result.innerHTML =
`<div style="position:relative;display:inline-block;">
<img src="${caseData.scanImage}" style="max-width:100%;max-height:240px;border-radius:8px;">
<div style="position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.3);border-radius:8px;"></div>
</div>`;

/* SPARA SEGMENT */
caseData.segmentedImage = caseData.scanImage;
localStorage.setItem("currentCase", JSON.stringify(caseData));

};

document.getElementById("saveBtn").onclick = e => {
e.preventDefault();
alert("Saved");
};

document.getElementById("logoutBtn").onclick = e => {
e.preventDefault();
window.location.href = "index.html";
};

</script>

</body>
</html>
