<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Assess Wound</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css">
</head>

<body class="simulator-body">

<header class="top-header">
<div class="header-left">
<img src="Images/logo.png" alt="Logo">
<h1>Advancing Medicine with Technology & AI</h1>
</div>
</header>

<div class="simulator-wrapper">
<div class="simulator-container">

<!-- LEFT MENU -->
<div class="menu-panel">

<a href="upload-scan.html" class="menu-btn">Upload Scan</a>
<a href="segment.html" class="menu-btn">Segment</a>
<a href="edit-profile.html" class="menu-btn">Edit Profile</a>
<a href="view.html" class="menu-btn">View</a>
<a href="print.html" class="menu-btn">Print</a>
<a href="assess-wound.html" class="menu-btn active">Assess Wound</a>

<a href="#" id="saveBtn" class="menu-btn">Save</a>
<a href="#" id="logoutBtn" class="menu-btn logout">Log Out</a>

</div>

<!-- RIGHT PANEL -->
<div class="display-panel">

<h2 class="page-title">Wound Assessment</h2>

<p>Fill in the wound assessment information.</p>

<form class="assess-form">

<div class="form-group">
<label>Size</label>
<select>
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>
</div>

<div class="form-group">
<label>Depth</label>
<select>
<option>Superficial</option>
<option>Partial</option>
<option>Deep</option>
</select>
</div>

<div class="form-group">
<label>Necrotic Tissue Type</label>
<select>
<option>None</option>
<option>Slough</option>
<option>Eschar</option>
</select>
</div>

<div class="form-group">
<label>Total Amount of Necrotic Tissue</label>
<select>
<option>None</option>
<option>Low</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Granulation Tissue Type</label>
<select>
<option>Healthy</option>
<option>Pale</option>
<option>Absent</option>
</select>
</div>

<div class="form-group">
<label>Total Amount of Granulation Tissue</label>
<select>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>
</div>

<div class="form-group">
<label>Edges</label>
<select>
<option>Healthy</option>
<option>Irregular</option>
<option>Rolled</option>
</select>
</div>

<div class="form-group">
<label>Periulcer Skin Viability</label>
<select>
<option>Healthy</option>
<option>At Risk</option>
<option>Damaged</option>
</select>
</div>

<br>

<button type="button" id="saveAssessment" class="action-btn">
Save Assessment
</button>

</form>

</div>

</div>
</div>

<script>

/* SAVE ASSESSMENT /

document.getElementById("saveAssessment").onclick = function(){

alert("Assessment saved successfully.");

};

/ SAVE BUTTON /

document.getElementById("saveBtn").onclick = function(e){
e.preventDefault();
alert("Your work has been saved successfully.");
};

/ LOGOUT */

document.getElementById("logoutBtn").onclick = function(e){
e.preventDefault();
alert("You have been logged out.");
window.location.href = "index.html";
};

</script>

</body>
</html>
